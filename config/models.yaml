models:
  - name: tinyllama
    type: lm
    path: TinyLlama/TinyLlama-1.1B-Chat-v1.0
    max_tokens: 256
    batch_size: 8

  - name: whisper-tiny
    type: asr
    path: openai/whisper-tiny
    audio_length_ms: 30000
    batch_size: 4

  - name: whisper-base
    type: asr
    path: openai/whisper-base
    audio_length_ms: 30000
    batch_size: 4

  - name: t5-small
    type: seq2seq
    path: google/t5-small
    max_tokens: 128
    batch_size: 8

  - name: flan-t5-small
    type: seq2seq
    path: google/flan-t5-small
    max_tokens: 128
    batch_size: 8

  - name: qwen-0.5
    type: lm
    path: Qwen/Qwen2-0.5B-Instruct
    max_tokens: 256
    batch_size: 8